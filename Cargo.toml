# Cargo manifest for fiducia-memory — the shared brain (library + API binary).
# A Postgres + pgvector memory service: durable, contestable, provenance-tracked
# organizational knowledge for AI agents. Coordination/authority stays in
# fiducia-node; this service holds probabilistic, searchable knowledge.
[package]
name = "fiducia-memory"
version = "0.1.0"
edition = "2021"
description = "The Fiducia shared brain: durable agent memory, a contestable claim ledger, and hybrid recall"
license = "MIT"

[dependencies]
async-trait = "0.1"
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
pgvector = { version = "0.4", features = ["sqlx"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.9", default-features = false, features = ["runtime-tokio", "tls-rustls-ring-webpki", "postgres", "uuid", "json", "chrono", "migrate", "derive", "macros"] }
tower-http = { version = "0.6", features = ["trace", "request-id", "timeout", "limit"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
