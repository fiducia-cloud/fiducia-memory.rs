# Cargo manifest for fiducia-memory — the shared brain (library + API binary).
# A Postgres + pgvector memory service: durable, contestable, provenance-tracked
# organizational knowledge for AI agents. Coordination/authority stays in
# fiducia-node; this service holds probabilistic, searchable knowledge.
[package]
name = "fiducia-memory"
version = "0.1.0"
edition = "2021"
description = "The Fiducia shared brain: durable agent memory, a contestable claim ledger, and hybrid recall"
license = "MIT"

[dependencies]
async-trait = "0.1"
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time", "net"] }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "postgres", "uuid", "json", "chrono"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["serde", "v4"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
