# Non-secret command-line configuration for fiducia-memory. DATABASE_URL remains
# environment-only so credentials cannot leak through argv or shell history.
[help]
url = "https://github.com/fiducia-cloud/fiducia-memory.rs"
columns = ["options", "env", "type", "description"]

[parse]
allow_unknown = false

[env]
ignore = ["DATABASE_URL"]

[flags.bind]
env = "FIDUCIA_MEMORY_BIND"
aliases = ["bind"]
short = "b"
type = "string"
help = "HTTP listen address."

[flags.migrate]
env = "FIDUCIA_MEMORY_MIGRATE"
aliases = ["migrate"]
short = "m"
type = "bool"
help = "Apply database migrations and exit."

[flags.log]
env = "RUST_LOG"
aliases = ["log"]
type = "string"
help = "Rust tracing filter."
